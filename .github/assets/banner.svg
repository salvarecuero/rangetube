<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300" role="img" aria-label="RangeTube: loop any YouTube segment, endlessly">
  <defs>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="0.55" stop-color="#2aa58a"/>
      <stop offset="0.72" stop-color="#e9c46a"/>
      <stop offset="1" stop-color="#e76f51"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0d9488" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="24" y="24" width="712" height="252" rx="30" fill="#f1f8f6" stroke="#d6e8e2" stroke-width="1.5" filter="url(#soft)"/>

  <!-- wordmark -->
  <text x="380" y="138" text-anchor="middle"
        font-family="'Trebuchet MS', 'Segoe UI', Verdana, sans-serif"
        font-size="76" font-weight="800" letter-spacing="-1.5" fill="#15302b">R<tspan fill="#0d9488">a</tspan>ngeTu<tspan fill="#e76f51">b</tspan>e</text>

  <!-- A->B track -->
  <g>
    <rect x="248" y="176" width="264" height="7" rx="3.5" fill="url(#track)"/>
    <circle cx="248" cy="179.5" r="13" fill="#ffffff" stroke="#0d9488" stroke-width="7"/>
    <circle cx="512" cy="179.5" r="13" fill="#ffffff" stroke="#e76f51" stroke-width="7"/>
  </g>

  <!-- tagline -->
  <text x="380" y="236" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="20" font-weight="500" letter-spacing="0.3" fill="#5c6f6a">Loop any YouTube segment&#160;&#160;&#183;&#160;&#160;endlessly</text>
</svg>
